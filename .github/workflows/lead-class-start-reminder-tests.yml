name: Lead Class Start Reminder Tests

on:
  pull_request:
    paths:
      - 'functions/leadClassStartReminderEmails.js'
      - 'scripts/patchLeadClassStartReminderEmails.mjs'
      - 'tests/lead-class-start-reminder-emails.test.js'
      - 'firebase.json'
      - '.github/workflows/deploy-firebase.yml'
      - '.github/workflows/lead-class-start-reminder-tests.yml'
  push:
    branches: [main]
    paths:
      - 'functions/leadClassStartReminderEmails.js'
      - 'scripts/patchLeadClassStartReminderEmails.mjs'
      - 'tests/lead-class-start-reminder-emails.test.js'
      - 'firebase.json'
      - '.github/workflows/deploy-firebase.yml'
      - '.github/workflows/lead-class-start-reminder-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Validate Firebase scheduler patch
        run: |
          node --check functions/leadClassStartReminderEmails.js
          node --check scripts/patchLeadClassStartReminderEmails.mjs
          node scripts/patchLeadClassStartReminderEmails.mjs
          node --check functions/index.js
          grep -F 'exports.sendLeadClassStartReminderEmails = createLeadClassStartReminderEmailJob' functions/index.js
          grep -F 'schedule: "0 8 * * *"' functions/leadClassStartReminderEmails.js
      - name: Test lead filtering, communication delivery and deduplication
        run: node --test tests/lead-class-start-reminder-emails.test.js
