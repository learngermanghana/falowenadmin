name: Live Class Suite Diagnostic

on:
  pull_request:
    paths:
      - 'src/utils/liveClassLessonOrder.js'
      - 'tests/live-class-a1-b1-timetable-repair.test.js'
      - '.github/workflows/live-class-suite-diagnostic.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Run full suite
        id: suite
        continue-on-error: true
        run: >-
          node --test
          tests/course-dictionary-id-casing.test.js
          tests/live-class-a1-b1-timetable-repair.test.js
          tests/live-class-complete-session-visibility.test.js
          tests/live-class-dictionary-selection.test.js
          tests/live-class-direct-session-change.test.js
          tests/live-class-lesson-order-repair.test.js
          tests/live-class-official-timetable-repair.test.js
          tests/live-class-rebuild-identity.test.js
          tests/live-class-schedule-rules.test.js
          tests/live-class-session-dedupe.test.js
          tests/live-class-session-rebuild.test.js
          tests/live-class-unified-session-change-ui.test.js
          > live-class-suite-output.txt 2>&1
      - name: Upload suite output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-class-suite-output
          path: live-class-suite-output.txt
      - name: Report suite failure
        if: steps.suite.outcome == 'failure'
        run: |
          cat live-class-suite-output.txt
          exit 1
