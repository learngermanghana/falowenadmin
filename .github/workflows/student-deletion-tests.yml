name: Student Deletion Tests

on:
  pull_request:
    paths:
      - 'functions/index.js'
      - 'scripts/patchStudentDeletionRuntime.mjs'
      - 'src/components/StudentSupportTools.jsx'
      - 'src/services/studentsService.js'
      - 'tests/student-deletion-response.test.js'
      - 'tests/student-deletion-runtime-patch.test.js'
      - 'firebase.json'
      - '.github/workflows/deploy-firebase.yml'
      - '.github/workflows/student-deletion-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'functions/index.js'
      - 'scripts/patchStudentDeletionRuntime.mjs'
      - 'src/components/StudentSupportTools.jsx'
      - 'src/services/studentsService.js'
      - 'tests/student-deletion-response.test.js'
      - 'tests/student-deletion-runtime-patch.test.js'
      - 'firebase.json'
      - '.github/workflows/deploy-firebase.yml'
      - '.github/workflows/student-deletion-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run student deletion regression tests
        run: >-
          node --test
          tests/student-deletion-response.test.js
          tests/student-deletion-runtime-patch.test.js

      - name: Build dashboard
        run: npm run build
