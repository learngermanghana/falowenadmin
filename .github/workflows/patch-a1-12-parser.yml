name: Patch A1-1.2 parser edge cases

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-a1-12-parser.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch objective parser
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          def replace_function(source, name, replacement):
              start = source.find(f"function {name}(")
              if start == -1:
                  raise SystemExit(f"{name} not found")
              next_match = re.search(r"\n(?:export\s+)?function\s+\w+\s*\(", source[start + 1:])
              end = start + 1 + next_match.start() if next_match else len(source)
              return source[:start] + replacement + "\n\n" + source[end:].lstrip()

          path = Path("src/utils/objectiveMarking.js")
          text = path.read_text()

          if "const A1_14_1_VOCAB_KEYS" not in text:
              text = text.replace(
                  'const HARDCODED_REFERENCE_ANSWERS = {',
                  'const A1_14_1_VOCAB_KEYS = { 6: "head", 7: "arm", 8: "leg", 9: "eye", 10: "nose", 11: "ear", 12: "mouth", 13: "hand", 14: "foot", 15: "stomach" };\n\nconst HARDCODED_REFERENCE_ANSWERS = {'
              )

          text = text.replace(
              '.replace(/ß/g, "ss")\n    .replace(/[^a-z0-9]+/g, " ")',
              '.replace(/ß/g, "ss")\n    .replace(/\\bheibe\\b/g, "heisse")\n    .replace(/\\bheibt\\b/g, "heisst")\n    .replace(/\\bheiben\\b/g, "heissen")\n    .replace(/[^a-z0-9]+/g, " ")',
          )
          text = text.replace(
              '/^(teil|part)\\s*\\d+\\s*:?$/i.test(trimmed)',
              '/^(teil|part)\\s*\\d+\\s*[.:;]?$/i.test(trimmed)',
          )
          text = text.replace(
              'const markerRegex = /(?:^|\\n)\\s*(teil|part)\\s*(\\d+)\\s*[:;]?\\s*/gi;',
              'const markerRegex = /(?:^|\\n)\\s*(teil|part)\\s*(\\d+)\\s*[.:;]?\\s*/gi;',
          )

          new_extract_vocab = "\n".join([
              'function extractVocabularyAnswers(text = "") {',
              '  const vocab = {};',
              '  for (const line of String(text).split(/\\n|\\r/)) {',
              '    const parts = line.split(/[-–:]/);',
              '    if (parts.length < 2) continue;',
              '    const left = normalizeAnswer(parts[0]);',
              '    const right = normalizeAnswer(parts.slice(1).join(" "));',
              '    if (!left || !right) continue;',
              '    vocab[left] = right;',
              '    const aliasKey = findVocabularyKey(left);',
              '    if (aliasKey) vocab[aliasKey] = right;',
              '  }',
              '  return vocab;',
              '}',
          ])
          text = replace_function(text, "extractVocabularyAnswers", new_extract_vocab)
          text = text.replace("export export function", "export function")

          new_extract_numbered = "\n".join([
              'function extractNumberedTextEntries(text = "") {',
              '  const source = String(text || "");',
              '  const markerRegex = /(?:^|\\s)(\\d{1,3})(?:\\s*[).:-]\\s*|\\s+)(?=[A-Za-zÄÖÜäöüß])/g;',
              '  const markers = [];',
              '  let match;',
              '  while ((match = markerRegex.exec(source))) {',
              '    const number = Number(match[1]);',
              '    if (Number.isFinite(number)) markers.push({ number, start: match.index, answerStart: markerRegex.lastIndex });',
              '  }',
              '  if (!markers.length) return [];',
              '  return markers',
              '    .map((marker, index) => {',
              '      const next = markers[index + 1];',
              '      const answer = source.slice(marker.answerStart, next ? next.start : source.length).trim();',
              '      return { number: marker.number, answer };',
              '    })',
              '    .filter((entry) => entry.answer)',
              '    .sort((a, b) => a.number - b.number);',
              '}',
          ])
          text = replace_function(text, "extractNumberedTextEntries", new_extract_numbered)

          if "function stripSubmissionHistory" not in text:
              helper_block = "\n".join([
                  'function stripSubmissionHistory(text = "") {',
                  '  return String(text || "").split(/resubmission improvement summary|previous submission/i)[0].trim();',
                  '}',
                  '',
                  'function extractSequentialFlatAnswers(text = "") {',
                  '  const cleanedText = stripSubmissionHistory(text);',
                  '  const sections = splitSubmissionIntoSections(cleanedText);',
                  '  const hasNamedSections = sections.some((section) => section.partId !== "main");',
                  '  const containers = hasNamedSections',
                  '    ? sections.filter((section) => section.partNumber !== 2).map((section) => section.text)',
                  '    : splitIntoAnswerBlocks(cleanedText);',
                  '  return containers.flatMap((container) => extractNumberedTextEntries(container).map((entry) => entry.answer));',
                  '}',
                  '',
              ])
              text = text.replace('export function extractNumberedVocabularyAnswers', helper_block + 'export function extractNumberedVocabularyAnswers')

          text = text.replace(
              'function getStudentAnswerForItem({ item, index, submissionText, sections, vocabularyIndexes, sequentialObjectiveAnswers, sequentialPartAnswers, useSequentialChoices }) {',
              'function getStudentAnswerForItem({ item, index, submissionText, sections, vocabularyIndexes, sequentialObjectiveAnswers, sequentialPartAnswers, sequentialFlatAnswers, useSequentialChoices, useSequentialFlatAnswers }) {',
          )
          text = text.replace(
              '  const sequentialPartAnswer = sequentialPartAnswers.get(`${item.partId}.${item.questionNumber}`);\n  if (sequentialPartAnswer !== undefined) return sequentialPartAnswer;',
              '  if (useSequentialFlatAnswers && sequentialFlatAnswers[index] !== undefined) return sequentialFlatAnswers[index];\n\n  const sequentialPartAnswer = sequentialPartAnswers.get(`${item.partId}.${item.questionNumber}`);\n  if (sequentialPartAnswer !== undefined) return sequentialPartAnswer;',
          )
          text = text.replace(
              '  const useSequentialChoices = (flatMainReference || (hasMultipartReference && !hasMatchingPartSections)) && choiceCount > 1 && sequentialObjectiveAnswers.length >= choiceCount;\n  const sequentialPartAnswers = buildSequentialPartAnswerMap(referenceItems, submissionText, hasMatchingPartSections);',
              '  const useSequentialChoices = (flatMainReference || (hasMultipartReference && !hasMatchingPartSections)) && choiceCount > 1 && sequentialObjectiveAnswers.length >= choiceCount;\n  const hasTextReferenceItems = referenceItems.some((item) => item.type === "text");\n  const sequentialFlatAnswers = flatMainReference && hasTextReferenceItems ? extractSequentialFlatAnswers(submissionText) : [];\n  const useSequentialFlatAnswers = flatMainReference && hasTextReferenceItems && sequentialFlatAnswers.length >= referenceItems.length;\n  const sequentialPartAnswers = buildSequentialPartAnswerMap(referenceItems, submissionText, hasMatchingPartSections);',
          )
          text = text.replace(
              'getStudentAnswerForItem({ item, index, submissionText, sections, vocabularyIndexes, sequentialObjectiveAnswers, sequentialPartAnswers, useSequentialChoices })',
              'getStudentAnswerForItem({ item, index, submissionText, sections, vocabularyIndexes, sequentialObjectiveAnswers, sequentialPartAnswers, sequentialFlatAnswers, useSequentialChoices, useSequentialFlatAnswers })',
          )

          text = text.replace(
              '    vocabularyKey: "",\n  }));',
              '    vocabularyKey: A1_14_1_VOCAB_KEYS[Number(key)] || "",\n  }));',
          )

          if 'if (item.type === "vocabulary") {' not in text:
              text = text.replace(
                  'function isCorrectAnswer(item, student) {\n  const expectedLetter = item.type === "choice"',
                  'function isCorrectAnswer(item, student) {\n  if (item.type === "vocabulary") {\n    const accepted = item.accepted?.length ? item.accepted : [item.expected];\n    return accepted.some((expected) => normalizeAnswer(expected) === normalizeAnswer(student));\n  }\n\n  const expectedLetter = item.type === "choice"'
              )

          path.write_text(text)
          PY

      - name: Add A1-1.2 regression test
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("tests/objective-marking.test.js")
          text = path.read_text()
          marker = "A1-1.2 accepts Teil labels with dots and heiBe typo"
          if marker not in text:
              text += "\n" + "\n".join([
                  '',
                  'test("A1-1.2 accepts Teil labels with dots and heiBe typo", () => {',
                  '  const referenceEntry = {',
                  '    assignmentKey: "A1-1.2",',
                  '    answers: {',
                  '      Answer1: "Ich heiße Anna",',
                  '      Answer2: "Du heißt Max",',
                  '      Answer3: "Er heißt Peter",',
                  '      Answer4: "Wir kommen aus Italien",',
                  '      Answer5: "Ihr kommt aus Brasilien",',
                  '      Answer6: "Sie kommt/k kommen aus Russland",',
                  '      Answer7: "Ich wohne in Berlin",',
                  '      Answer8: "Du wohnst in Madrid",',
                  '      Answer9: "Sie wohnt in Wien",',
                  '      Answer10: "A) Anna",',
                  '      Answer11: "C) Aus Italien",',
                  '      Answer12: "D) In Berlin",',
                  '      Answer13: "B) Tom",',
                  '      Answer14: "A) In Berlin",',
                  '    },',
                  '  };',
                  '',
                  '  const result = computeObjectiveScore(referenceEntry, `',
                  'Teil 1.',
                  '1.Ich heiBe Anna.',
                  '2.Du wohnenst bei Max',
                  '3. Er heiBt peter',
                  '4.Wir kommen aus italien.',
                  '5.Ich kommen aus Brasilien',
                  '6. Sie Kommen aus Russland.',
                  '7.Ich wohne in Berlin',
                  '8. Du kommen in Madrid.',
                  '9.Sie wohnen in wien.',
                  '',
                  'Teil 2.',
                  'Halo, Ich heiBe Marietta. Ich komme aus Ghana und ich wohne in Boadua.',
                  '',
                  'Teil 3.',
                  '1.A)Anna.',
                  '2.A) Aus Deutschland.',
                  '3.D) In Berlin.',
                  '4. A) Peter.',
                  '5. A) In Berlin',
                  '',
                  'Resubmission improvement summary',
                  'I’ve learnt to do it correctly',
                  '',
                  'Previous submission',
                  '1. Ich heiBen Anna 2. Du wohnen Max',
                  '  `);',
                  '',
                  '  assert.equal(result.totalCount, 14);',
                  '  assert.equal(result.correctCount, 8);',
                  '  assert.equal(result.details["1"].student, "Ich heiBe Anna.");',
                  '  assert.equal(result.details["1"].correct, true);',
                  '  assert.equal(result.details["2"].correct, false);',
                  '  assert.equal(result.details["10"].student, "A)Anna.");',
                  '  assert.equal(result.details["10"].correct, true);',
                  '  assert.equal(result.details["11"].correct, false);',
                  '  assert.equal(result.details["14"].correct, true);',
                  '});',
                  '',
              ])
              path.write_text(text)
              print("Added A1-1.2 regression test.")
          else:
              print("A1-1.2 regression test already exists.")
          PY

      - name: Run objective marking tests only
        run: node --test tests/objective-marking.test.js

      - name: Commit parser fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/utils/objectiveMarking.js tests/objective-marking.test.js
          git commit -m "Handle dotted Teil labels and A1 heiße typos" || exit 0
          git push
