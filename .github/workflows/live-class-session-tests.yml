name: Live Class Session Tests

on:
  pull_request:
    paths:
      - 'src/components/ClassEditorCard.jsx'
      - 'src/components/CreateClassCard.jsx'
      - 'src/components/LiveClassLessonDateRepair.jsx'
      - 'src/components/SessionDictionaryPicker.jsx'
      - 'src/data/courseDictionary.js'
      - 'src/data/courseSessionGroups.js'
      - 'src/pages/CanonicalAttendancePage.jsx'
      - 'src/pages/ClassScheduleSetupPage.jsx'
      - 'src/pages/LiveClassesPage.js'
      - 'src/pages/LiveClassesPageV2.jsx'
      - 'src/services/classCohortUpdateService.js'
      - 'src/services/liveClassCancelService.js'
      - 'src/services/liveClassCompatibilityService.js'
      - 'src/services/liveClassCompatibilityServiceBase.js'
      - 'src/services/liveClassRebuildService.js'
      - 'src/services/liveClassRescheduleService.js'
      - 'src/services/liveClassSchedulePreparation.js'
      - 'src/services/liveClassService.js'
      - 'src/services/liveClassSessionCleanupService.js'
      - 'src/services/liveClassSessionDirectService.js'
      - 'src/utils/liveClassDictionarySelection.js'
      - 'src/utils/liveClassLessonOrder.js'
      - 'src/utils/liveClassRebuildIdentity.js'
      - 'src/utils/liveClassScheduleRules.js'
      - 'src/utils/liveClassScheduling.js'
      - 'src/utils/liveClassSessionDedupe.js'
      - 'src/utils/liveClassSessionRebuildPlan.js'
      - 'tests/course-dictionary-id-casing.test.js'
      - 'tests/live-class-complete-session-visibility.test.js'
      - 'tests/live-class-dictionary-selection.test.js'
      - 'tests/live-class-direct-session-change.test.js'
      - 'tests/live-class-lesson-order-repair.test.js'
      - 'tests/live-class-rebuild-identity.test.js'
      - 'tests/live-class-schedule-rules.test.js'
      - 'tests/live-class-session-dedupe.test.js'
      - 'tests/live-class-session-rebuild.test.js'
      - 'tests/live-class-unified-session-change-ui.test.js'
      - '.github/workflows/live-class-session-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'src/components/ClassEditorCard.jsx'
      - 'src/components/CreateClassCard.jsx'
      - 'src/components/LiveClassLessonDateRepair.jsx'
      - 'src/components/SessionDictionaryPicker.jsx'
      - 'src/data/courseDictionary.js'
      - 'src/data/courseSessionGroups.js'
      - 'src/pages/CanonicalAttendancePage.jsx'
      - 'src/pages/ClassScheduleSetupPage.jsx'
      - 'src/pages/LiveClassesPage.js'
      - 'src/pages/LiveClassesPageV2.jsx'
      - 'src/services/classCohortUpdateService.js'
      - 'src/services/liveClassCancelService.js'
      - 'src/services/liveClassCompatibilityService.js'
      - 'src/services/liveClassCompatibilityServiceBase.js'
      - 'src/services/liveClassRebuildService.js'
      - 'src/services/liveClassRescheduleService.js'
      - 'src/services/liveClassSchedulePreparation.js'
      - 'src/services/liveClassService.js'
      - 'src/services/liveClassSessionCleanupService.js'
      - 'src/services/liveClassSessionDirectService.js'
      - 'src/utils/liveClassDictionarySelection.js'
      - 'src/utils/liveClassLessonOrder.js'
      - 'src/utils/liveClassRebuildIdentity.js'
      - 'src/utils/liveClassScheduleRules.js'
      - 'src/utils/liveClassScheduling.js'
      - 'src/utils/liveClassSessionDedupe.js'
      - 'src/utils/liveClassSessionRebuildPlan.js'
      - 'tests/course-dictionary-id-casing.test.js'
      - 'tests/live-class-complete-session-visibility.test.js'
      - 'tests/live-class-dictionary-selection.test.js'
      - 'tests/live-class-direct-session-change.test.js'
      - 'tests/live-class-lesson-order-repair.test.js'
      - 'tests/live-class-rebuild-identity.test.js'
      - 'tests/live-class-schedule-rules.test.js'
      - 'tests/live-class-session-dedupe.test.js'
      - 'tests/live-class-session-rebuild.test.js'
      - 'tests/live-class-unified-session-change-ui.test.js'
      - '.github/workflows/live-class-session-tests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live class session tests
        run: >-
          node --test
          tests/course-dictionary-id-casing.test.js
          tests/live-class-complete-session-visibility.test.js
          tests/live-class-dictionary-selection.test.js
          tests/live-class-direct-session-change.test.js
          tests/live-class-lesson-order-repair.test.js
          tests/live-class-rebuild-identity.test.js
          tests/live-class-schedule-rules.test.js
          tests/live-class-session-dedupe.test.js
          tests/live-class-session-rebuild.test.js
          tests/live-class-unified-session-change-ui.test.js

      - name: Build dashboard
        run: npm run build
