name: Deploy Falowen Admin Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'scripts/**'
      - 'firebase.json'
      - 'firestore.indexes.json'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:

concurrency:
  group: falowenadmin-firebase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      FIREBASE_PROJECT_ID: falowen-examiner-trainer
      GOOGLE_CLOUD_PROJECT: falowen-examiner-trainer
      GCLOUD_PROJECT: falowen-examiner-trainer
      CLOUD_RUNTIME_CONFIG: ${{ secrets.FALOWEN_ADMIN_CLOUD_RUNTIME_CONFIG || '{}' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show deployment revision
        run: |
          echo "Deploying commit $GITHUB_SHA from $GITHUB_REF_NAME"
          git log -1 --oneline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Validate Firebase predeploy patches
        shell: bash
        run: |
          set -euo pipefail
          for script in \
            scripts/patchSheetRowManagementRoutes.mjs \
            scripts/patchOperationalSheetAutoSyncJobs.mjs \
            scripts/patchLiveClassUpdateScheduleSync.mjs \
            scripts/patchHolidayClassScheduleAwareness.mjs
          do
            echo "Checking $script"
            node --check "$script"
            node "$script"
          done
          node --check functions/index.js

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FALOWEN }}'

      - name: Deploy falowenadmin Cloud Function
        # Intentionally deploy only functions:falowenadmin; this service account does not require Firestore index permissions.
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only functions:falowenadmin --force --debug