name: Apply extended check-in piano playlist

on:
  push:
    branches:
      - expand-checkin-piano-playlist
    paths:
      - .github/workflows/apply-extended-piano-playlist.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: expand-checkin-piano-playlist

      - name: Expand piano playlist
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pages/CheckinDisplayPage.jsx')
          text = path.read_text(encoding='utf-8')

          def replace_once(old, new, label):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
          '''const WAITING_PIANO_CHORDS = [
            [130.81, 261.63, 329.63, 392.0],
            [110.0, 220.0, 261.63, 329.63],
            [87.31, 174.61, 220.0, 261.63],
            [98.0, 196.0, 246.94, 293.66],
          ];''',
          '''const PIANO_BAR_INTERVAL_MS = 4600;
          const PIANO_CHORDS = {
            C: [130.81, 261.63, 329.63, 392.0],
            Am: [110.0, 220.0, 261.63, 329.63],
            F: [87.31, 174.61, 220.0, 261.63],
            G: [98.0, 196.0, 246.94, 293.66],
            Dm: [73.42, 146.83, 174.61, 220.0],
            Em: [82.41, 164.81, 196.0, 246.94],
            Bb: [116.54, 233.08, 293.66, 349.23],
            D: [73.42, 146.83, 185.0, 220.0],
            Bm: [61.74, 123.47, 146.83, 185.0],
            A: [55.0, 110.0, 138.59, 164.81],
          };
          const PIANO_MELODIES = {
            hopeful: [659.25, 783.99, 880.0, 783.99, 659.25, 587.33, 523.25, null],
            warm: [659.25, 523.25, 587.33, 659.25, 783.99, 659.25, 587.33, null],
            calm: [698.46, 659.25, 587.33, 523.25, 587.33, 659.25, 698.46, null],
            lift: [783.99, 880.0, 987.77, 880.0, 783.99, 659.25, 587.33, null],
            bright: [1046.5, 987.77, 880.0, 783.99, 880.0, 987.77, 1046.5, null],
            reflective: [880.0, 783.99, 659.25, 587.33, 659.25, 523.25, 493.88, null],
            open: [587.33, 659.25, 739.99, 880.0, 739.99, 659.25, 587.33, null],
            home: [783.99, 659.25, 587.33, 523.25, 587.33, 659.25, 523.25, null],
          };
          const PIANO_PIECES = [
            { title: "Morning Light", progression: ["C", "Am", "F", "G", "C", "Am", "F", "G"], melodies: ["hopeful", "warm", "calm", "lift", "bright", "warm", "calm", "home"] },
            { title: "Open Road", progression: ["G", "Em", "C", "D", "G", "Em", "C", "D"], melodies: ["lift", "warm", "hopeful", "open", "bright", "reflective", "hopeful", "home"] },
            { title: "Quiet Courage", progression: ["F", "Dm", "Bb", "C", "F", "Dm", "Bb", "C"], melodies: ["calm", "reflective", "open", "hopeful", "bright", "warm", "calm", "home"] },
            { title: "New Horizons", progression: ["D", "Bm", "G", "A", "D", "Bm", "G", "A"], melodies: ["open", "warm", "lift", "bright", "hopeful", "reflective", "lift", "home"] },
            { title: "Evening Glow", progression: ["Am", "F", "C", "G", "Am", "F", "C", "G"], melodies: ["reflective", "calm", "hopeful", "home", "bright", "warm", "hopeful", "home"] },
            { title: "Bright Steps", progression: ["C", "G", "Am", "F", "C", "G", "Am", "F"], melodies: ["hopeful", "lift", "bright", "calm", "bright", "open", "warm", "home"] },
          ];
          const WAITING_PIANO_PLAYLIST = PIANO_PIECES.flatMap((piece) => piece.progression.map((chordName, index) => ({
            title: piece.title,
            chord: PIANO_CHORDS[chordName],
            melody: PIANO_MELODIES[piece.melodies[index]],
          })));''',
          'playlist constants')

          replace_once(
          '''function scheduleWaitingPiano(context, destination, chord) {
            const startsAt = context.currentTime + 0.3;
            const order = [0, 2, 1, 3];

            order.forEach((chordIndex, sequenceIndex) => {
              const frequency = chord[chordIndex];
              if (!frequency) return;
              const noteStartsAt = startsAt + (sequenceIndex * 0.22);
              const velocity = sequenceIndex === 0 ? 0.52 : 0.38;
              schedulePianoNote(context, destination, frequency, noteStartsAt, velocity, 3.8 - (sequenceIndex * 0.12));
            });
          }''',
          '''function scheduleWaitingPiano(context, destination, bar) {
            const startsAt = context.currentTime + 0.28;
            const beatSeconds = 0.52;
            const arpeggioOrder = [0, 2, 1, 3, 1, 2, 3, 2];

            arpeggioOrder.forEach((chordIndex, sequenceIndex) => {
              const frequency = bar.chord[chordIndex];
              const velocity = sequenceIndex === 0 || sequenceIndex === 4 ? 0.34 : 0.22;
              schedulePianoNote(context, destination, frequency, startsAt + (sequenceIndex * beatSeconds), velocity, 1.65);
            });

            bar.melody.forEach((frequency, sequenceIndex) => {
              if (!frequency) return;
              schedulePianoNote(context, destination, frequency, startsAt + 0.12 + (sequenceIndex * beatSeconds), 0.2, 1.08);
            });
          }''',
          'piano scheduler')

          replace_once(
          '''  const [musicError, setMusicError] = useState("");
            const audioContextRef = useRef(null);''',
          '''  const [musicError, setMusicError] = useState("");
            const [currentPianoPiece, setCurrentPianoPiece] = useState(PIANO_PIECES[0].title);
            const audioContextRef = useRef(null);''',
          'piece state')

          replace_once(
          '''    musicGainRef.current = null;
            musicChordIndexRef.current = 0;

            if (context && context.state !== "closed") {''',
          '''    musicGainRef.current = null;
            musicChordIndexRef.current = 0;
            setCurrentPianoPiece(PIANO_PIECES[0].title);

            if (context && context.state !== "closed") {''',
          'piece reset')

          replace_once(
          '''      const playNextChord = () => {
                if (context.state !== "running") return;
                const chord = WAITING_PIANO_CHORDS[musicChordIndexRef.current % WAITING_PIANO_CHORDS.length];
                musicChordIndexRef.current += 1;
                scheduleWaitingPiano(context, masterGain, chord);
              };

              playNextChord();
              musicTimerRef.current = window.setInterval(playNextChord, 4300);''',
          '''      const playNextBar = () => {
                if (context.state !== "running") return;
                const bar = WAITING_PIANO_PLAYLIST[musicChordIndexRef.current % WAITING_PIANO_PLAYLIST.length];
                musicChordIndexRef.current += 1;
                setCurrentPianoPiece(bar.title);
                scheduleWaitingPiano(context, masterGain, bar);
              };

              playNextBar();
              musicTimerRef.current = window.setInterval(playNextBar, PIANO_BAR_INTERVAL_MS);''',
          'playlist loop')

          replace_once(
          '''                <span aria-hidden="true">♫</span> Soft piano music
                      </div>
                      <div className="checkin-display-music-note">
                        Gentle built-in piano while students wait. You should hear a short piano confirmation when it starts.
                      </div>''',
          '''                <span aria-hidden="true">♫</span> Extended piano playlist
                      </div>
                      <div className="checkin-display-music-note">
                        About four minutes of original modern and cinematic piano before the playlist repeats.
                        {musicPlaying ? ` Now playing: ${currentPianoPiece}.` : ""}
                      </div>''',
          'music copy')

          replace_once(
          '''              {musicPlaying ? "Stop piano" : "Start piano music"}''',
          '''              {musicPlaying ? "Stop piano" : "Start piano playlist"}''',
          'button label')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit expanded playlist
        run: |
          git config user.name "Falowen Automation"
          git config user.email "moxflex@gmail.com"
          rm .github/workflows/apply-extended-piano-playlist.yml
          git add src/pages/CheckinDisplayPage.jsx .github/workflows/apply-extended-piano-playlist.yml
          git commit -m "Expand check-in piano playlist"
          git push origin expand-checkin-piano-playlist
