name: Dashboard Class Progress Tests

on:
  pull_request:
    paths:
      - "src/pages/DashboardPage.jsx"
      - "tests/dashboard-class-progress.test.js"
      - ".github/workflows/dashboard-class-progress-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test class progress calculation
        run: node --test tests/dashboard-class-progress.test.js

      - name: Build dashboard
        run: npm run build
