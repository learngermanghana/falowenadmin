name: Apply extended piano playlist

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'extended-original-piano-playlist'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: extended-original-piano-playlist
      - name: Patch check-in display
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/pages/CheckinDisplayPage.jsx')
          s = p.read_text()
          s = s.replace('import { getClassSchedule } from "../data/classSchedules";', 'import { getClassSchedule } from "../data/classSchedules";\nimport { pianoPieces, pianoPlaylist } from "../data/pianoPlaylist.js";\nimport { PIANO_BAR_INTERVAL_MS, schedulePianoBar } from "../utils/pianoAudio.js";')
          s = s.replace('  const [musicError, setMusicError] = useState("");', '  const [musicError, setMusicError] = useState("");\n  const [currentPianoPiece, setCurrentPianoPiece] = useState(pianoPieces[0][0]);')
          s = s.replace('    musicChordIndexRef.current = 0;', '    musicChordIndexRef.current = 0;\n    setCurrentPianoPiece(pianoPieces[0][0]);', 1)

          lines = s.splitlines()
          start = next(i for i, line in enumerate(lines) if 'const playNextChord = () =>' in line)
          end = next(i for i, line in enumerate(lines[start:], start) if 'setInterval(playNextChord, 4300)' in line)
          indent = lines[start].split('const playNextChord')[0]
          block = [
            f'{indent}const playNextBar = () => {{',
            f'{indent}  if (context.state !== "running") return;',
            f'{indent}  const bar = pianoPlaylist[musicChordIndexRef.current % pianoPlaylist.length];',
            f'{indent}  musicChordIndexRef.current += 1;',
            f'{indent}  setCurrentPianoPiece(bar.title);',
            f'{indent}  schedulePianoBar(context, masterGain, bar);',
            f'{indent}}};',
            '',
            f'{indent}playNextBar();',
            f'{indent}musicTimerRef.current = window.setInterval(playNextBar, PIANO_BAR_INTERVAL_MS);',
          ]
          lines[start:end + 1] = block
          s = '\n'.join(lines) + '\n'
          s = s.replace('Soft piano music', 'Extended piano playlist')
          s = s.replace('Gentle built-in piano while students wait. You should hear a short piano confirmation when it starts.', 'About four minutes of original modern and cinematic piano before repeating. {musicPlaying ? `Now playing: ${currentPianoPiece}.` : ""}')
          s = s.replace('Start piano music', 'Start piano playlist')
          p.write_text(s)
          PY
      - name: Commit changes
        run: |
          git config user.name "Falowen Automation"
          git config user.email "moxflex@gmail.com"
          rm .github/workflows/apply-piano-playlist.yml
          git add src/pages/CheckinDisplayPage.jsx .github/workflows/apply-piano-playlist.yml
          git commit -m "Expand check-in piano playlist"
          git push origin extended-original-piano-playlist
